server:
  port: 8888

spring:
  application:
    name: config-service

  cloud:
    config:
      server:
        git:
          uri: https://github.com/sahidreza212/lovable-config-server
          username: ${GIT_USERNAME}
          password: ${GIT_PASSWORD}
          default-label: main
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    config:
      enabled: false


---
spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false
    config.server.git:
      uri: https://github.com/sahidreza212/lovable-config-server
      username: ${GIT_USERNAME}
      password: ${GIT_PASSWORD}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

